apiVersion: v1
kind: Namespace
metadata:
  name: secuclaw
  labels:
    app.kubernetes.io/name: secuclaw
    app.kubernetes.io/component: namespace
---
apiVersion: v1
kind: Secret
metadata:
  name: secuclaw-secrets
  namespace: secuclaw
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secuclaw
  namespace: secuclaw
  labels:
    app.kubernetes.io/name: secuclaw
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: secuclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secuclaw
        app.kubernetes.io/version: "latest"
    spec:
      containers:
        - name: secuclaw
          image: secuclaw:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 21000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "21000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 21000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 21000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: secuclaw
  namespace: secuclaw
  labels:
    app.kubernetes.io/name: secuclaw
spec:
  type: ClusterIP
  ports:
    - port: 21000
      targetPort: 21000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: secuclaw
