server:
  host: "0.0.0.0"
  port: 3000
  wsPort: 3001
  cors:
    origins:
      - "http://localhost:5173"
    credentials: true

agents:
  defaultModel: "claude-sonnet-4-20250514"
  maxTokens: 200000
  temperature: 0.7
  maxSteps: 100
  timeout: 300000

session:
  persistencePath: "./data/sessions"
  compactionThreshold: 150000
  maxMessages: 100
  compaction:
    enabled: true
    preserveLastN: 10
    summarizeOlder: true

memory:
  vectorEnabled: true
  bm25Enabled: true
  decayFactor: 0.1
  diversityWeight: 0.5
  embeddingProvider: "openai"
  embeddingModel: "text-embedding-3-small"

scheduler:
  heartbeatEnabled: true
  heartbeatInterval: 10000
  wakeMergeWindow: 250
  maxConcurrentTasks: 10

sandbox:
  enabled: true
  dockerImage: "secuclaw-sandbox:bookworm-slim"
  timeout: 60000
  memoryLimit: "512m"

logging:
  level: "info"
  format: "json"
  output:
    - "stdout"
    - "file"
  filePath: "./logs/esc.log"
