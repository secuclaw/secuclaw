      description: "设计安全防护架构"
      policy: "allow"
      sandboxed: false
      
    - id: "defense:incident-response"
      name: "事件响应"
      description: "安全事件应急响应"
      policy: "allow"
      sandboxed: false

  analysis:
    - id: "analysis:logs"
      name: "日志分析"
      description: "分析系统日志发现异常"
      policy: "allow"
      sandboxed: false
      
    - id: "analysis:threat-intel"
      name: "威胁情报"
      description: "查询威胁情报数据"
      policy: "allow"
      sandboxed: false
      
    - id: "analysis:risk"
