tools:
  policy:
    default: "deny"
    sandboxed: true
    requireApproval: true
  
  attack:
    - id: "attack:discover-path"
      name: "攻击路径发现"
      description: "从攻击者视角发现潜在攻击路径"
      policy: "deny"
      sandboxed: true
      requiresApproval: true
      severity: "critical"
      mitreTechniques:
        - "TA0001"
        - "TA0008"
        - "TA0009"
      
    - id: "attack:validate-exploit"
      name: "漏洞利用验证"
      description: "验证漏洞可利用性和影响范围"
      policy: "deny"
      sandboxed: true
      requiresApproval: true
      severity: "critical"
      
    - id: "attack:simulate"
      name: "攻击模拟 (AAS)"
      description: "自动化攻击模拟验证防御有效性"
      policy: "deny"
      sandboxed: true
      requiresApproval: true
      severity: "high"
      
    - id: "attack:penetration-test"
      name: "渗透测试"
      description: "授权范围内的渗透测试"
      policy: "deny"
      sandboxed: true
      requiresApproval: true
      severity: "high"
      
    - id: "attack:threat-hunt"
      name: "威胁狩猎"
      description: "主动发现隐藏威胁"
      policy: "allow"
      sandboxed: false
      requiresApproval: false
      severity: "medium"

  defense:
    - id: "defense:threat-detect"
      name: "威胁检测"
      description: "检测已知和未知威胁"
      policy: "allow"
      sandboxed: false
      
    - id: "defense:vulnerability-scan"
