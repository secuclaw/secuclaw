replicaCount: 2

image:
  api:
    repository: secuclaw/api
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  web:
    repository: secuclaw/web
    pullPolicy: IfNotPresent
    tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

api:
  service:
    type: ClusterIP
    port: 3000
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

web:
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: secuclaw.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
  tls:
    - secretName: secuclaw-tls
      hosts:
        - secuclaw.example.com

postgresql:
  enabled: true
  auth:
    postgresPassword: secuclaw
    password: secuclaw
    database: secuclaw
  primary:
    persistence:
      enabled: true
      size: 20Gi

redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 5Gi

config:
  llm:
    provider: openai
    model: gpt-4
    apiKeySecret: secuclaw-llm-api-key
    apiKeyKey: api-key
  logging:
    level: info
  security:
    corsOrigins: []
    rateLimit:
      enabled: true
      requestsPerMinute: 100

nodeSelector: {}

tolerations: []

affinity: {}
