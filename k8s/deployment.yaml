apiVersion: apps/v1
kind: Deployment
metadata:
  name: secuclaw
  labels:
    app: secuclaw
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secuclaw
  template:
    metadata:
      labels:
        app: secuclaw
    spec:
      containers:
      - name: secuclaw-core
        image: secuclaw:latest
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 3001
          name: ws
        env:
        - name: NODE_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: skills
          mountPath: /app/skills
          readOnly: true
        - name: data
          mountPath: /app/data
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: secuclaw-config
      - name: skills
        configMap:
          name: secuclaw-skills
      - name: data
        persistentVolumeClaim:
          claimName: secuclaw-data-pvc
