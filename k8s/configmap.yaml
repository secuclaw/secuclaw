apiVersion: v1
kind: ConfigMap
metadata:
  name: esc-config
data:
  default.yaml: |
    server:
      host: "0.0.0.0"
      port: 3000
      wsPort: 3001
    agents:
      defaultModel: "claude-sonnet-4-20250514"
      maxTokens: 200000
      temperature: 0.7
    session:
      persistencePath: "/app/data/sessions"
      compactionThreshold: 150000
    memory:
      vectorEnabled: true
      bm25Enabled: true
    scheduler:
      heartbeatEnabled: true
      heartbeatInterval: 10000
    logging:
      level: "info"
      format: "json"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esc-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
