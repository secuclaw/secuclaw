apiVersion: v1
kind: Service
metadata:
  name: secuclaw
  labels:
    app: secuclaw
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: ws
  selector:
    app: secuclaw
---
apiVersion: v1
kind: Service
metadata:
  name: secuclaw-nodeport
  labels:
    app: secuclaw
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
    nodePort: 30080
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: ws
    nodePort: 30081
  selector:
    app: secuclaw
